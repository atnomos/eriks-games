<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eriks Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Nunito:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="wordmark">ERIKS <span>GAMES</span></div>
    <p class="header-sub">Browser games, built for fun</p>
  </header>

  <main>
    <div class="grid">

      <!-- Penguin Clash -->
      <a class="card" href="./penguinclash/">
        <div class="thumb thumb--penguin">
          <div class="ice"></div>
          <div class="dot" style="background:#FFD700; top:38%; left:50%; transform:translate(-50%,-50%)"></div>
          <div class="dot" style="background:#FF6B6B; top:58%; left:64%; transform:translate(-50%,-50%)"></div>
          <div class="dot" style="background:#4ADE80; top:58%; left:36%; transform:translate(-50%,-50%)"></div>
          <div class="dot" style="background:#A78BFA; top:64%; left:50%; transform:translate(-50%,-50%)"></div>
        </div>
        <div class="info">
          <h2>Penguin Clash</h2>
          <p>Last penguin standing wins</p>
          <span class="play">Play <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2L11 7L3 12V2Z" fill="currentColor"/></svg></span>
        </div>
      </a>

      <!-- Spider Man -->
      <a class="card" href="./spiderman/">
        <div class="thumb thumb--spiderman">
          <div class="web web--1"></div>
          <div class="web web--2"></div>
          <div class="spider-dot"></div>
        </div>
        <div class="info">
          <h2>Spider Man</h2>
          <p>Swing through the city</p>
          <span class="play">Play <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 2L11 7L3 12V2Z" fill="currentColor"/></svg></span>
        </div>
      </a>

      <div class="card card--soon">
        <div class="thumb thumb--soon"></div>
        <div class="info">
          <h2>Coming Soon</h2>
          <p>Another game is on the way</p>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <p>Games by Erik Valle 2026</p>
  </footer>

</body>
</html>
